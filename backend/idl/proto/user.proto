syntax="proto3";

package cloud_disk;

message LoginRequest{
    string username = 1;
    string password = 2;
}

message LoginResponse{
    string status = 1;
    string message = 2;
    string token_type = 3;
    string access_token = 4;
    int32 userId = 5;
    string username = 6;
}

message RegisterRequest{
    string username = 1;
    string password = 2;
    string confirm = 3;
}

message RegisterResponse{
    string status = 1;
    string message = 2;
    int32 userId = 3;
    string username = 4;
}

message GetUserRequest{
    int32 userId = 1;
}

message GetUserResponse{
    string status = 1;
    string message = 2;
    int32 userId = 3;
    string username = 4;
    string createdAt = 5;
}

service UserService{
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

